# Risks. ID format: R-XXX. Likelihood: Low | Medium | High. Impact: Low | Medium | High | Critical.
# status: Open | Mitigating | Resolved | Accepted
# Optional: date_resolved
# Last cleaned: 2026-02-22 — removed duplicate R-007, R-008 entries from earlier refactor session.
risks:
  - id: R-001
    risk: "DOCX/PPTX export fidelity insufficient for professional use (manual correction required)"
    likelihood: High
    impact: Critical
    mitigation: "Technical spike against a real client document type (e.g. advisory report or board paper) before any external commitment on quality; validate print stylesheet and reference template thoroughly"
    owner: TBD
    status: Open
    date_added: "2026-02-19"
  - id: R-002
    risk: "LLM hallucination in clause-adjacent or variable content"
    likelihood: Medium
    impact: High
    mitigation: "Deterministic clause insertion only; human confirmation for all AI-generated content; AI scoped to variable zones only"
    owner: TBD
    status: Open
    date_added: "2026-02-19"
  - id: R-003
    risk: "Behaviour change resistance — users revert to ad hoc formatting"
    likelihood: Low
    impact: Low
    mitigation: "Phase 1+ risk; primary user is also designer in Phase 0, so resistance is minimal. For Phase 1+: template-first UX; style picker primary; character formatting behind friction notice"
    owner: TBD
    status: Open
    date_added: "2026-02-19"
  - id: R-004
    risk: "Microsoft adds competing AI-native document mode to Word"
    likelihood: Medium
    impact: High
    mitigation: "Accelerate time to market; deepen vertical integration and compliance story; InDesign positioning (authoring vs distribution)"
    owner: TBD
    status: Open
    date_added: "2026-02-19"
  - id: R-005
    risk: "Government procurement delayed by security certification (ISM, IRAP)"
    likelihood: High
    impact: Medium
    mitigation: "Phase 2 risk; not relevant to Phase 0 or Phase 1. Complete ADR for LLM provider and data sovereignty before government engagement; plan certification into roadmap"
    owner: TBD
    status: Open
    date_added: "2026-02-19"
  - id: R-006
    risk: "Clause library onboarding friction slows initial sales"
    likelihood: Medium
    impact: Medium
    mitigation: "Validate with 1–2 target accounts; define pricing and partner model before go-to-market"
    owner: TBD
    status: Open
    date_added: "2026-02-19"
  - id: R-007
    risk: "Pandoc + CSS print stylesheet does not produce professional-quality PDF without significant investment"
    likelihood: Medium
    impact: High
    mitigation: "Technical spike against a real client document type before claiming export quality; budget time for stylesheet iteration; evaluate Lua filters and pandoc-crossref early"
    owner: TBD
    status: Open
    date_added: "2026-02-22"
  - id: R-008
    risk: "TipTap WYSIWYG rendering of Pandoc fenced divs (:::callout, :::executive-summary) is non-trivial; custom ProseMirror nodes may be brittle or incomplete"
    likelihood: Medium
    impact: High
    mitigation: "Build a focused PoC for the two or three most important semantic block types before committing to TipTap; assess Slate and Lexical as alternatives if PoC reveals blocking limitations"
    owner: TBD
    status: Open
    date_added: "2026-02-22"
  - id: R-009
    risk: "Deck mode (Phase 1) visual quality insufficient for client deliverables; clients expect Figma/Canva production quality"
    likelihood: High
    impact: Medium
    mitigation: "Set honest expectations: deck mode provides structural fidelity (right content, right slides); pixel-perfect design remains a separate step for high-production artefacts. Validate this framing with target users before building. Invest in a strong reference PPTX template to raise the quality floor."
    owner: TBD
    status: Open
    date_added: "2026-02-22"
  - id: R-010
    risk: "Sheet mode formula language design is high-risk; choosing wrong execution model creates technical debt that is expensive to reverse"
    likelihood: Medium
    impact: Critical
    mitigation: "Do not design the formula language until sheet mode is prioritised (Phase 2). Use real user data from sheet mode usage to inform the design. Consider whether a subset of Excel formula syntax is sufficient rather than inventing a new language."
    owner: TBD
    status: Open
    date_added: "2026-02-22"
